<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory Card</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app">
    <a class="back-link" href="../../">← 게임 목록</a>
    <header class="topbar">
      <div>
        <h1>Memory Card</h1>
        <p class="subtitle">같은 그림의 카드 두 장을 찾아 모든 짝을 맞춰보세요.</p>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="time">00:00</span>
        </div>
        <div class="stat">
          <span class="stat-label">Moves</span>
          <span class="stat-value" id="moves">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Matched</span>
          <span class="stat-value" id="matched">0/0</span>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="board-wrap" aria-label="Memory card board">
        <div class="board" id="board"></div>
      </section>

      <aside class="panel">
        <section class="panel-section">
          <p class="panel-title">새 게임</p>
          <div class="controls">
            <select class="select" id="difficulty" aria-label="Difficulty">
              <option value="easy">쉬움 4x3</option>
              <option value="medium" selected>보통 4x4</option>
              <option value="hard">어려움 6x4</option>
              <option value="large">도전 6x6</option>
              <option value="wide">집중 8x6</option>
              <option value="expert">전문가 8x8</option>
            </select>
            <button class="btn primary" id="newGameBtn" type="button">시작</button>
          </div>
          <p class="message" id="message">카드 두 장을 뒤집어 같은 그림을 찾으세요.</p>
        </section>

        <section class="panel-section">
          <p class="panel-title">도구</p>
          <div class="controls">
            <button class="btn" id="peekBtn" type="button">잠깐 보기</button>
            <button class="btn" id="restartBtn" type="button">재시작</button>
          </div>
        </section>

        <section class="panel-section">
          <p class="panel-title">규칙</p>
          <ul class="rules">
            <li>한 번에 카드 두 장을 뒤집습니다.</li>
            <li>같은 그림이면 열린 상태로 남습니다.</li>
            <li>모든 카드를 맞추면 기록이 멈춥니다.</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <script src="assets/js/game.js"></script>
</body>
</html>
