<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sudoku</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Sudoku</h1>
        <p class="subtitle">숫자를 채우고, 메모를 남기고, 막히면 힌트를 하나만 받아보세요.</p>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="time">00:00</span>
        </div>
        <div class="stat">
          <span class="stat-label">Mistakes</span>
          <span class="stat-value" id="mistakes">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Filled</span>
          <span class="stat-value" id="filled">0/81</span>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="board-wrap" aria-label="Sudoku board">
        <div class="board" id="board"></div>
      </section>

      <aside class="panel">
        <section class="panel-section">
          <p class="panel-title">숫자</p>
          <div class="number-pad" id="numberPad"></div>
        </section>

        <section class="panel-section">
          <p class="panel-title">도구</p>
          <div class="controls">
            <button class="btn" id="noteBtn" type="button">메모</button>
            <button class="btn" id="eraseBtn" type="button">지우기</button>
            <button class="btn" id="hintBtn" type="button">힌트</button>
            <button class="btn" id="checkBtn" type="button">검사</button>
          </div>
          <p class="message" id="message">빈 칸을 선택한 뒤 숫자를 입력하세요.</p>
        </section>

        <section class="panel-section">
          <p class="panel-title">새 게임</p>
          <div class="controls">
            <select class="select" id="difficulty" aria-label="Difficulty">
              <option value="easy">쉬움</option>
              <option value="medium" selected>보통</option>
              <option value="hard">어려움</option>
            </select>
            <button class="btn primary" id="newGameBtn" type="button">시작</button>
          </div>
        </section>

        <section class="panel-section">
          <p class="panel-title">키보드</p>
          <ul class="kbd">
            <li>숫자 1-9: 선택 칸 입력</li>
            <li>Backspace 또는 Delete: 지우기</li>
            <li>N: 메모 모드 전환</li>
            <li>방향키: 칸 이동</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <script src="assets/js/game.js"></script>
</body>
</html>
